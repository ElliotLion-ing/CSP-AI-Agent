# Nginx reverse proxy configuration for CSP AI Agent MCP Server (SSE)

upstream mcp_sse_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 8080;
    server_name localhost;

    access_log /var/log/nginx/mcp_sse_access.log;
    error_log /var/log/nginx/mcp_sse_error.log;

    # Root endpoint
    location / {
        proxy_pass http://mcp_sse_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE endpoint - requires special handling
    location /sse {
        proxy_pass http://mcp_sse_backend;
        proxy_http_version 1.1;
        
        # Disable buffering for SSE
        proxy_buffering off;
        proxy_cache off;
        
        # Long timeout for SSE connections
        proxy_read_timeout 24h;
        proxy_connect_timeout 5s;
        proxy_send_timeout 24h;
        
        # Keep connection alive
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
        tcp_nodelay on;
        tcp_nopush off;
        
        # Forward headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Add CORS headers if needed
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
    }

    # Message endpoint
    location /message {
        proxy_pass http://mcp_sse_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for message processing
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://mcp_sse_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Short timeout for health checks
        proxy_read_timeout 10s;
        proxy_connect_timeout 3s;
    }
}
