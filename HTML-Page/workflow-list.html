<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CSP AI Agent - 工作流列表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--surface3:#2a2f47;
  --border:#2e3354;--accent:#5b6ef5;--accent2:#7b8dff;--accent-bg:rgba(91,110,245,.14);
  --green:#2dd4bf;--green-bg:rgba(45,212,191,.13);
  --yellow:#f59e0b;--yellow-bg:rgba(245,158,11,.12);
  --red:#f87171;--red-bg:rgba(248,113,113,.12);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.14);
  --text:#e2e8f0;--muted:#64748b;--dim:#94a3b8;
  --sidebar-w:264px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* ── Header ── */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);height:52px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;position:relative}
.hdr-left{display:flex;align-items:center;gap:10px}
.logo{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:-.3px}
.hdr-sep{width:1px;height:22px;background:var(--border)}
.page-title{font-size:13px;color:var(--muted)}
.btn{padding:6px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--dim);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}

/* ── User switcher ── */
.user-switcher{position:relative}
.user-pill{display:flex;align-items:center;gap:8px;padding:5px 10px 5px 6px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;transition:all .15s;user-select:none}
.user-pill:hover{border-color:var(--accent)}
.user-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:12px;font-weight:600;color:var(--text)}
.user-team{font-size:10px;color:var(--muted)}
.user-caret{font-size:10px;color:var(--muted)}
.user-dropdown{position:absolute;right:0;top:calc(100% + 6px);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:6px;min-width:200px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.4);display:none}
.user-dropdown.open{display:block}
.user-dropdown-title{font-size:10px;color:var(--muted);padding:4px 8px 6px;letter-spacing:.5px;text-transform:uppercase}
.user-opt{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;transition:background .12s}
.user-opt:hover{background:var(--surface2)}
.user-opt.active{background:var(--accent-bg)}
.user-opt-info{flex:1;min-width:0}
.user-opt-name{font-size:12px;font-weight:600;color:var(--text)}
.user-opt-team{font-size:10px;color:var(--muted)}
.user-opt-check{font-size:12px;color:var(--accent)}

/* ── Body layout: content + sidebar ── */
.body-layout{flex:1;display:flex;overflow:hidden;min-height:0}

/* ── Main content ── */
.main{flex:1;padding:32px 40px;overflow-y:auto;min-width:0}

/* ── Toolbar row ── */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:16px}
.toolbar-left{display:flex;align-items:center;gap:12px}
.page-h{font-size:20px;font-weight:700;color:var(--text)}
.count-badge{font-size:12px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:2px 10px}
.search-wrap{position:relative}
.search-wrap input{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 12px 8px 34px;outline:none;width:220px;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--accent)}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted);pointer-events:none}

/* ── Filter tabs ── */
.filter-row{display:flex;gap:6px;margin-bottom:24px}
.ftab{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .12s}
.ftab:hover{color:var(--text);border-color:var(--dim)}
.ftab.on{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}

/* ── Workflow grid ── */
.wf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}

/* ── Card ── */
.wf-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:18px;transition:all .15s;position:relative;overflow:hidden}
.wf-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent-bg) 0%,transparent 60%);opacity:0;transition:opacity .2s;pointer-events:none}
.wf-card:hover{border-color:var(--accent);box-shadow:0 4px 24px rgba(91,110,245,.15);transform:translateY(-2px)}
.wf-card:hover::before{opacity:1}

.wf-card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:8px}
.wf-card-title{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;flex:1;min-width:0}
.card-head-right{display:flex;gap:4px;flex-shrink:0;align-items:center}
.wf-card-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
.badge-active{background:var(--green-bg);color:var(--green)}
.badge-draft{background:var(--yellow-bg);color:var(--yellow)}
.badge-archived{background:var(--surface2);color:var(--muted)}

/* subscribe star button in card head */
.sub-star{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;flex-shrink:0;position:relative;z-index:1}
.sub-star:hover{border-color:var(--yellow);color:var(--yellow);background:var(--yellow-bg)}
.sub-star.subscribed{border-color:var(--yellow);color:var(--yellow);background:var(--yellow-bg)}

/* owner / team info row */
.wf-owner-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.owner-avatar{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.owner-name{font-size:11px;color:var(--dim)}
.owner-sep{font-size:10px;color:var(--border)}
.team-badge{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500}
.team-common{background:rgba(91,110,245,.2);color:var(--accent)}
.team-productive{background:rgba(45,212,191,.15);color:var(--green)}

/* permission label */
.perm-label{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500;flex-shrink:0}
.perm-owner{background:rgba(245,158,11,.15);color:var(--yellow)}
.perm-teammate{background:rgba(91,110,245,.15);color:var(--accent)}
.perm-readonly{background:var(--surface2);color:var(--muted)}

.wf-card-desc{font-size:11px;color:var(--muted);line-height:1.55;margin-bottom:12px;min-height:32px}

.wf-card-meta{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.meta-item{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--dim)}
.meta-ico{font-size:11px}

/* node/edge preview strip */
.wf-preview{display:flex;align-items:center;gap:3px;margin-bottom:12px;overflow:hidden}
.preview-node{display:flex;align-items:center;gap:3px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:3px 7px;font-size:10px;color:var(--dim);white-space:nowrap;flex-shrink:0}
.preview-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.dot-entry{background:var(--green)}
.dot-step{background:var(--accent)}
.dot-decision{background:var(--yellow)}
.dot-end{background:var(--purple)}
.preview-arrow{color:var(--border);font-size:11px;flex-shrink:0}
.preview-more{font-size:10px;color:var(--muted);flex-shrink:0}

/* resource chips */
.wf-res-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;min-height:18px}
.res-chip{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
.chip-rule{background:var(--yellow-bg);color:var(--yellow)}
.chip-skill{background:var(--green-bg);color:var(--green)}
.chip-mcp{background:var(--accent-bg);color:var(--accent)}
.chip-command{background:var(--purple-bg);color:var(--purple)}

/* card footer */
.wf-card-foot{display:flex;align-items:center;justify-content:space-between;padding-top:11px;border-top:1px solid var(--border)}
.card-actions{display:flex;gap:5px;position:relative;z-index:1}
.card-btn{font-size:11px;padding:4px 9px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .12s}
.card-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.card-btn.danger:hover:not(:disabled){border-color:var(--red);color:var(--red);background:var(--red-bg)}
.card-btn.primary{border-color:var(--accent);color:var(--accent)}
.card-btn.primary:hover:not(:disabled){background:var(--accent);color:#fff}
.card-btn:disabled{opacity:.32;cursor:not-allowed}
.card-ts{font-size:10px;color:var(--muted)}

/* new card */
.wf-card.new-card{border-style:dashed;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:180px;gap:10px;cursor:pointer}
.wf-card.new-card:hover{border-color:var(--accent);background:var(--accent-bg)}
.new-ico{font-size:32px;opacity:.5}
.new-label{font-size:13px;color:var(--muted);font-weight:500}

/* empty state */
.empty-state{text-align:center;padding:80px 20px;opacity:.6}
.empty-ico{font-size:56px;margin-bottom:16px}
.empty-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px}
.empty-desc{font-size:13px;color:var(--muted)}

/* ── Subscription Sidebar ── */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-title{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--text)}
.sidebar-title-ico{font-size:15px}
.sidebar-sub-count{font-size:11px;color:var(--muted);margin-top:3px}
.sidebar-body{flex:1;overflow-y:auto;padding:10px 0}
.sidebar-empty{text-align:center;padding:40px 16px;opacity:.6}
.sidebar-empty-ico{font-size:36px;margin-bottom:10px}
.sidebar-empty-text{font-size:12px;color:var(--muted);line-height:1.6}

/* subscription item */
.sub-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;cursor:pointer;transition:background .12s;position:relative}
.sub-item:hover{background:var(--surface2)}
.sub-item.active-item{background:var(--accent-bg)}
.sub-item-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.sub-item-body{flex:1;min-width:0}
.sub-item-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sub-item-meta{font-size:10px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:4px}
.sub-item-badge{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600}
.sub-item-unsub{width:20px;height:20px;border-radius:4px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .12s;flex-shrink:0;margin-top:1px}
.sub-item:hover .sub-item-unsub{opacity:1}
.sub-item-unsub:hover{color:var(--red);background:var(--red-bg)}

.sidebar-footer{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0}
.sidebar-footer-text{font-size:10px;color:var(--muted);line-height:1.5;text-align:center}

/* ── Modal base ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;transform:translateY(12px);transition:transform .18s}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px}
.modal-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px}

/* ── History modal ── */
.hist-modal{width:520px;max-height:80vh;display:flex;flex-direction:column;padding:0}
.hist-modal-head{padding:20px 24px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.hist-modal-title{font-size:15px;font-weight:700;color:var(--text)}
.hist-modal-sub{font-size:12px;color:var(--muted);margin-top:3px}
.hist-body{overflow-y:auto;padding:16px 24px;flex:1}
.hist-empty{text-align:center;padding:40px 0;color:var(--muted);font-size:13px}
.hist-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.hist-item:last-child{border-bottom:none}
.hist-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px}
.hist-content{flex:1;min-width:0}
.hist-who{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.hist-username{font-size:12px;font-weight:600;color:var(--text)}
.hist-action-badge{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:500}
.action-edit{background:var(--accent-bg);color:var(--accent)}
.action-publish{background:var(--green-bg);color:var(--green)}
.action-archive{background:var(--surface2);color:var(--muted)}
.action-create{background:rgba(167,139,250,.15);color:var(--purple)}
.action-restore{background:var(--yellow-bg);color:var(--yellow)}
.hist-time{font-size:10px;color:var(--muted);margin-left:auto;flex-shrink:0}
.hist-detail{font-size:11px;color:var(--dim);line-height:1.5}
.hist-modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;flex-shrink:0}

/* ── Delete modal ── */
.del-modal{width:360px}

/* ── Toast ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 18px;font-size:13px;color:var(--text);opacity:0;transition:all .22s;z-index:200;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Tooltip ── */
[data-tip]{position:relative}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1e2235;border:1px solid var(--border);color:var(--text);font-size:11px;padding:4px 8px;border-radius:5px;white-space:nowrap;z-index:300;pointer-events:none}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hdr-left">
    <div class="logo">CSP Agent</div>
    <div class="hdr-sep"></div>
    <span class="page-title">工作流管理</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="user-switcher" id="userSwitcher">
      <div class="user-pill" onclick="toggleUserDropdown()">
        <div class="user-avatar" id="hdrAvatar"></div>
        <div>
          <div class="user-name" id="hdrName"></div>
          <div class="user-team" id="hdrTeam"></div>
        </div>
        <span class="user-caret">▾</span>
      </div>
      <div class="user-dropdown" id="userDropdown">
        <div class="user-dropdown-title">切换用户（演示）</div>
        <div id="userOptList"></div>
      </div>
    </div>
    <button class="btn btn-primary" onclick="createNew()">＋ 新建工作流</button>
  </div>
</div>

<!-- Body: main + sidebar -->
<div class="body-layout">

  <!-- Main -->
  <div class="main">
    <div class="toolbar">
      <div class="toolbar-left">
        <span class="page-h">工作流</span>
        <span class="count-badge" id="countBadge">0 个</span>
      </div>
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索工作流名称..." oninput="renderList()"/>
      </div>
    </div>

    <div class="filter-row">
      <button class="ftab on" data-f="all"      onclick="setFilter('all',this)">全部</button>
      <button class="ftab"    data-f="active"   onclick="setFilter('active',this)">已发布</button>
      <button class="ftab"    data-f="draft"    onclick="setFilter('draft',this)">草稿</button>
      <button class="ftab"    data-f="archived" onclick="setFilter('archived',this)">已归档</button>
    </div>

    <div class="wf-grid" id="wfGrid"></div>
  </div>

  <!-- Subscription Sidebar -->
  <div class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-title">
        <span class="sidebar-title-ico">★</span>
        我的订阅
      </div>
      <div class="sidebar-sub-count" id="sidebarSubCount">0 个工作流</div>
    </div>
    <div class="sidebar-body" id="sidebarBody"></div>
    <div class="sidebar-footer">
      <div class="sidebar-footer-text">点击卡片上的 ☆ 订阅工作流<br>订阅后可快速跳转到编辑器</div>
    </div>
  </div>

</div><!-- /body-layout -->

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="delModal">
  <div class="modal del-modal" onclick="event.stopPropagation()">
    <div class="modal-title">删除工作流</div>
    <div class="modal-desc" id="delModalDesc"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeDelModal()">取消</button>
      <button class="btn" style="background:var(--red);color:#fff" onclick="confirmDelete()">确认删除</button>
    </div>
  </div>
</div>

<!-- History Modal -->
<div class="modal-overlay" id="histModal">
  <div class="modal hist-modal" onclick="event.stopPropagation()">
    <div class="hist-modal-head">
      <div class="hist-modal-title" id="histTitle">编辑历史</div>
      <div class="hist-modal-sub" id="histSub"></div>
    </div>
    <div class="hist-body" id="histBody"></div>
    <div class="hist-modal-foot">
      <button class="btn btn-ghost" onclick="closeHistModal()">关闭</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════
// ORG DATA
// ════════════════════════════════════════
const TEAMS = {
  common:     { name:'Common Team',     color:'#5b6ef5' },
  productive: { name:'Productive Team', color:'#2dd4bf' },
};
const USERS = {
  'elliot.ding':   { id:'elliot.ding',   name:'Elliot Ding',   team:'common',     initials:'ED', color:'#5b6ef5' },
  'starier.huang': { id:'starier.huang', name:'Starier Huang', team:'common',     initials:'SH', color:'#7b8dff' },
  'totti.zheng':   { id:'totti.zheng',   name:'Totti Zheng',   team:'productive', initials:'TZ', color:'#2dd4bf' },
  'giannis.ge':    { id:'giannis.ge',    name:'Giannis Ge',    team:'productive', initials:'GG', color:'#34d399' },
};

let currentUserId = 'elliot.ding';
function currentUser() { return USERS[currentUserId]; }

// ════════════════════════════════════════
// PERMISSION MODEL
// ════════════════════════════════════════
function getPermission(wf) {
  const cu = currentUser();
  if (wf.createdBy === cu.id) return 'owner';
  const wfUser = USERS[wf.createdBy];
  if (wfUser && wfUser.team === cu.team) return 'teammate';
  return 'readonly';
}
function canEdit(wf)   { const p=getPermission(wf); return p==='owner'||p==='teammate'; }
function canDelete(wf) { return getPermission(wf)==='owner'; }
function canToggle(wf) { const p=getPermission(wf); return p==='owner'||p==='teammate'; }

// ════════════════════════════════════════
// STORAGE KEYS
// ════════════════════════════════════════
const STORAGE_KEY  = 'csp_workflows';
const HISTORY_KEY  = 'csp_wf_history';
const SUB_KEY      = 'csp_wf_subscriptions'; // { userId: Set<wfId> } — stored as { userId: [wfId,...] }

function loadWorkflows() {
  try { const r=localStorage.getItem(STORAGE_KEY); if(r) return JSON.parse(r); } catch(e){}
  return null;
}
function saveWorkflows()  { localStorage.setItem(STORAGE_KEY,  JSON.stringify(workflows)); }

function loadHistory() {
  try { const r=localStorage.getItem(HISTORY_KEY); if(r) return JSON.parse(r); } catch(e){}
  return {};
}
function saveHistory()    { localStorage.setItem(HISTORY_KEY,  JSON.stringify(wfHistory)); }

function loadSubs() {
  try { const r=localStorage.getItem(SUB_KEY); if(r) return JSON.parse(r); } catch(e){}
  return {};
}
function saveSubs()       { localStorage.setItem(SUB_KEY, JSON.stringify(subscriptions)); }

function recordHistory(wfId, action, detail) {
  if (!wfHistory[wfId]) wfHistory[wfId] = [];
  wfHistory[wfId].unshift({ userId:currentUserId, action, detail:detail||'', ts:Date.now() });
  if (wfHistory[wfId].length > 50) wfHistory[wfId] = wfHistory[wfId].slice(0,50);
  saveHistory();
}

// ── Subscription helpers ──
function getSubsForUser(uid) {
  if (!subscriptions[uid]) subscriptions[uid] = [];
  return subscriptions[uid];
}
function isSubscribed(wfId) {
  return getSubsForUser(currentUserId).includes(wfId);
}
function toggleSubscription(wfId) {
  const subs = getSubsForUser(currentUserId);
  const idx = subs.indexOf(wfId);
  if (idx === -1) {
    subs.push(wfId);
    saveSubs();
    renderSidebar();
    renderList();          // refresh star buttons
    const wf = workflows.find(w=>w.id===wfId);
    toast(`已订阅「${wf ? wf.name : wfId}」`);
  } else {
    subs.splice(idx, 1);
    saveSubs();
    renderSidebar();
    renderList();
    const wf = workflows.find(w=>w.id===wfId);
    toast(`已取消订阅「${wf ? wf.name : wfId}」`);
  }
}

function renderList() {
  const q    = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('wfGrid');

  let list = workflows.filter(w=>{
    if (filterMode!=='all' && w.status!==filterMode) return false;
    if (q && !w.name.toLowerCase().includes(q) && !(w.desc||'').toLowerCase().includes(q)) return false;
    return true;
  }).slice().sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));

  document.getElementById('countBadge').textContent = `${workflows.length} 个`;
  grid.innerHTML = '';

  if (list.length===0 && workflows.length===0) {
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-ico">🗂</div><div class="empty-title">还没有工作流</div>
      <div class="empty-desc">点击右上角「新建工作流」开始创建</div></div>`;
  } else if (list.length===0) {
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-ico">🔍</div><div class="empty-title">没有匹配的工作流</div>
      <div class="empty-desc">尝试修改搜索关键词或筛选条件</div></div>`;
  } else {
    list.forEach(wf=>grid.appendChild(buildCard(wf)));
  }

  const nc=document.createElement('div');
  nc.className='wf-card new-card'; nc.onclick=createNew;
  nc.innerHTML=`<div class="new-ico">＋</div><div class="new-label">新建工作流</div>`;
  grid.appendChild(nc);
}

// ════════════════════════════════════════
// BUILD CARD
// ════════════════════════════════════════
function buildCard(wf) {
  const card = document.createElement('div');
  card.className = 'wf-card';
  card.id = `card-${wf.id}`;

  const perm  = getPermission(wf);
  const owner = USERS[wf.createdBy]||{name:'未知',initials:'?',color:'#666',team:'common'};
  const subscribed = isSubscribed(wf.id);

  const statusMap  = {active:'已发布',draft:'草稿',archived:'已归档'};
  const badgeClass = ({active:'badge-active',draft:'badge-draft',archived:'badge-archived'})[wf.status]||'badge-draft';
  const permMap    = {owner:'我创建',teammate:'同组',readonly:'只读'};
  const permClass  = {owner:'perm-owner',teammate:'perm-teammate',readonly:'perm-readonly'};
  const permTip    = {owner:'你是创建者，可编辑、发布/归档、删除',teammate:'同组成员，可编辑和发布/归档，但不能删除',readonly:'其他组成员，只能查看'};

  // Node preview
  const nodes = wf.nodes||[];
  const dotClass={entry:'dot-entry',step:'dot-step',decision:'dot-decision',end:'dot-end'};
  let previewHtml=nodes.slice(0,4).map((n,i)=>
    `<span class="preview-node"><span class="preview-dot ${dotClass[n.type]||'dot-step'}"></span>${n.title}</span>${i<Math.min(nodes.length,4)-1?'<span class="preview-arrow">›</span>':''}`
  ).join('');
  if (nodes.length>4) previewHtml+=`<span class="preview-more">+${nodes.length-4}</span>`;

  // Resource chips
  const allRes=[],seen=new Set();
  (wf.nodes||[]).forEach(n=>(n.resources||[]).forEach(r=>{if(!seen.has(r.id)){seen.add(r.id);allRes.push(r);}}));
  const chipsHtml=allRes.slice(0,5).map(r=>`<span class="res-chip chip-${r.type}">${r.name}</span>`).join('')
    +(allRes.length>5?`<span class="res-chip" style="background:var(--surface2);color:var(--muted)">+${allRes.length-5}</span>`:'');

  const nodeCount=(wf.nodes||[]).length;
  const edgeCount=(wf.edges||[]).length;
  const ts=wf.updatedAt?relTime(wf.updatedAt):'未知';
  const teamClass=owner.team==='common'?'team-common':'team-productive';
  const hCount=(wfHistory[wf.id]||[]).length;

  const editDis   = !canEdit(wf)   ? 'disabled' : '';
  const toggleDis = !canToggle(wf) ? 'disabled' : '';
  const deleteDis = !canDelete(wf) ? 'disabled' : '';
  const editTip   = !canEdit(wf)   ? '无权限：仅同组成员可编辑' : '';
  const deleteTip = !canDelete(wf) ? '无权限：仅创建者可删除'   : '';
  const toggleTip = !canToggle(wf) ? '无权限：仅同组成员可操作' : '';

  card.innerHTML = `
    <div class="card-body-link" data-id="${wf.id}" style="cursor:pointer">
      <div class="wf-card-head">
        <div class="wf-card-title">${escHtml(wf.name)}</div>
        <div class="card-head-right">
          <button class="sub-star ${subscribed?'subscribed':''}"
                  data-action="subscribe" data-id="${wf.id}"
                  data-tip="${subscribed?'取消订阅':'订阅此工作流'}">
            ${subscribed?'★':'☆'}
          </button>
          <span class="perm-label ${permClass[perm]}" data-tip="${permTip[perm]}">${permMap[perm]}</span>
          <span class="wf-card-badge ${badgeClass}">${statusMap[wf.status]||'草稿'}</span>
        </div>
      </div>
      <div class="wf-owner-row">
        <div class="owner-avatar" style="background:${owner.color}">${owner.initials}</div>
        <span class="owner-name">${owner.name}</span>
        <span class="owner-sep">·</span>
        <span class="team-badge ${teamClass}">${TEAMS[owner.team].name}</span>
      </div>
      <div class="wf-card-desc">${escHtml(wf.desc||'暂无描述')}</div>
      <div class="wf-card-meta">
        <span class="meta-item"><span class="meta-ico">⬡</span>${nodeCount} 个节点</span>
        <span class="meta-item"><span class="meta-ico">→</span>${edgeCount} 条连线</span>
        <span class="meta-item"><span class="meta-ico">📦</span>${allRes.length} 个资源</span>
        <span class="meta-item"><span class="meta-ico">🏷</span>v${wf.version||'1.0'}</span>
        ${hCount>0?`<span class="meta-item" style="cursor:pointer;color:var(--accent)" data-action="history" data-id="${wf.id}"><span class="meta-ico">🕐</span>${hCount} 条历史</span>`:''}
      </div>
      ${previewHtml?`<div class="wf-preview">${previewHtml}</div>`:''}
      ${chipsHtml?`<div class="wf-res-row">${chipsHtml}</div>`:'<div class="wf-res-row"></div>'}
    </div>
    <div class="wf-card-foot">
      <span class="card-ts">更新于 ${ts}</span>
      <div class="card-actions">
        <button class="card-btn" data-action="history"   data-id="${wf.id}" data-tip="查看编辑历史">历史</button>
        <button class="card-btn" data-action="duplicate" data-id="${wf.id}">复制</button>
        <button class="card-btn" data-action="toggle"    data-id="${wf.id}" ${toggleDis} ${toggleTip?`data-tip="${toggleTip}"`:''}>${wf.status==='active'?'归档':'发布'}</button>
        <button class="card-btn danger" data-action="delete" data-id="${wf.id}" data-name="${escAttr(wf.name)}" ${deleteDis} ${deleteTip?`data-tip="${deleteTip}"`:''}">删除</button>
        <button class="card-btn primary" data-action="edit" data-id="${wf.id}" ${editDis} ${editTip?`data-tip="${editTip}"`:''}">编辑 →</button>
      </div>
    </div>
  `;

  card.addEventListener('click', e=>{
    const btn = e.target.closest('[data-action]');
    if (btn) {
      e.stopPropagation();
      if (btn.disabled) return;
      const {action, id} = btn.dataset;
      if      (action==='subscribe')  toggleSubscription(id);
      else if (action==='duplicate')  duplicateWf(id);
      else if (action==='toggle')     toggleStatus(id);
      else if (action==='delete')     askDelete(id, btn.dataset.name);
      else if (action==='edit')       openEditor(id);
      else if (action==='history')    openHistModal(id);
      return;
    }
    if (e.target.closest('.card-body-link')) openEditor(wf.id);
  });

  return card;
}

  const statusMap  = {active:'已发布',draft:'草稿',archived:'已归档'};

  const dotClsMap  = {active:'dot-entry',draft:'dot-decision',archived:'dot-end'};  // reuse color tokens

          <div class="sub-item-name" title="${escHtml(wf.name)}">${escHtml(wf.name)}</div>
          <div class="sub-item-meta">
            <span class="sub-item-badge ${badgeCls[wf.status]||'badge-draft'}">${statusMap[wf.status]||'草稿'}</span>
            <span>·</span>
            <span>${nodeCount} 节点</span>
            <span>·</span>
            <span>v${wf.version||'1.0'}</span>
          </div>
        </div>
        <button class="sub-item-unsub" data-action="unsub" data-id="${wf.id}" title="取消订阅">✕</button>
      </div>`;
  }).join('');

  // Delegate events on sidebar body
  body.onclick = e=>{
    const unsub = e.target.closest('[data-action="unsub"]');
    if (unsub) { e.stopPropagation(); toggleSubscription(unsub.dataset.id); return; }
    const item = e.target.closest('[data-action="open-sub"]');
    if (item) openEditor(item.dataset.id);
  };
}

// ════════════════════════════════════════
// ACTIONS
// ════════════════════════════════════════
function setFilter(f, btn) {
  filterMode = f;
  document.querySelectorAll('.filter-row .ftab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderList();
}

function createNew() {
  const id = 'wf-'+Date.now();
  const wf = { id, name:'新工作流', desc:'', status:'draft', version:'1.0', createdBy:currentUserId, updatedAt:Date.now(), nodes:[], edges:[] };
  workflows.unshift(wf);
  saveWorkflows();
  recordHistory(id,'create','创建工作流「新工作流」');
  openEditor(id);
}

function openEditor(id) {
  sessionStorage.setItem('csp_edit_wf_id',   id);
  sessionStorage.setItem('csp_current_user', currentUserId);
  window.location.href = 'workflow-builder.html';
}

function duplicateWf(id) {
  const wf = workflows.find(w=>w.id===id); if(!wf) return;
  const copy = JSON.parse(JSON.stringify(wf));
  copy.id = 'wf-'+Date.now(); copy.name=wf.name+' (副本)'; copy.status='draft';
  copy.createdBy=currentUserId; copy.updatedAt=Date.now();
  workflows.unshift(copy); saveWorkflows();
  recordHistory(copy.id,'create',`复制自「${wf.name}」`);
  renderList(); renderSidebar();
  toast(`已复制「${wf.name}」`);
}

function toggleStatus(id) {
  const wf=workflows.find(w=>w.id===id); if(!wf||!canToggle(wf)) return;
  let actionLabel,toastMsg;
  if (wf.status==='active')     { wf.status='archived'; actionLabel='archive'; toastMsg='已归档'; }
  else if (wf.status==='draft') { wf.status='active';   actionLabel='publish'; toastMsg='已发布'; }
  else                          { wf.status='draft';    actionLabel='restore'; toastMsg='已恢复为草稿'; }
  wf.updatedAt=Date.now(); saveWorkflows();
  const nm={archive:'归档',publish:'发布',restore:'恢复为草稿'};
  recordHistory(id,actionLabel,`${nm[actionLabel]}工作流`);
  renderList(); renderSidebar();
  toast(toastMsg);
}

// ── Delete ──
function askDelete(id,name) {
  const wf=workflows.find(w=>w.id===id);
  if (!wf||!canDelete(wf)) { toast('无权限：仅创建者可删除'); return; }
  pendingDeleteId=id;
  document.getElementById('delModalDesc').textContent=`确认删除工作流「${name}」？此操作不可撤销。`;
  document.getElementById('delModal').classList.add('show');
}
function closeDelModal() { pendingDeleteId=null; document.getElementById('delModal').classList.remove('show'); }
function confirmDelete() {
  if (!pendingDeleteId) return;
  const wf=workflows.find(w=>w.id===pendingDeleteId);
  if (wf&&!canDelete(wf)) { toast('无权限'); closeDelModal(); return; }
  workflows=workflows.filter(w=>w.id!==pendingDeleteId);
  // Also remove from subscriptions
  Object.keys(subscriptions).forEach(uid=>{
    subscriptions[uid]=subscriptions[uid].filter(id=>id!==pendingDeleteId);
  });
  saveWorkflows(); saveSubs(); closeDelModal();
  renderList(); renderSidebar();
  toast(`已删除「${wf?wf.name:'工作流'}」`);
}
document.getElementById('delModal').addEventListener('click',e=>{if(e.target===document.getElementById('delModal'))closeDelModal();});

// ── History ──
function openHistModal(id) {
  const wf=workflows.find(w=>w.id===id); if(!wf) return;
  document.getElementById('histTitle').textContent=`编辑历史：${wf.name}`;
  document.getElementById('histSub').textContent=`共 ${(wfHistory[id]||[]).length} 条记录`;
  const entries=wfHistory[id]||[];
  const aLabel={create:'创建',edit:'编辑',publish:'发布',archive:'归档',restore:'恢复'};
  const aCls={create:'action-create',edit:'action-edit',publish:'action-publish',archive:'action-archive',restore:'action-restore'};
  const body=document.getElementById('histBody');
  body.innerHTML = entries.length===0
    ? `<div class="hist-empty">暂无历史记录</div>`
    : entries.map(e=>{
        const u=USERS[e.userId]||{name:e.userId,initials:'?',color:'#666'};
        return `<div class="hist-item">
          <div class="hist-avatar" style="background:${u.color}">${u.initials}</div>
          <div class="hist-content">
            <div class="hist-who">
              <span class="hist-username">${u.name}</span>
              <span class="hist-action-badge ${aCls[e.action]||'action-edit'}">${aLabel[e.action]||e.action}</span>
              <span class="hist-time">${relTime(e.ts)}</span>
            </div>
            <div class="hist-detail">${escHtml(e.detail)}</div>
          </div>
        </div>`;
      }).join('');
  document.getElementById('histModal').classList.add('show');
}
function closeHistModal() { document.getElementById('histModal').classList.remove('show'); }
document.getElementById('histModal').addEventListener('click',e=>{if(e.target===document.getElementById('histModal'))closeHistModal();});

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDelModal();closeHistModal();}});

// ════════════════════════════════════════
// UTILS
// ════════════════════════════════════════
function relTime(ts) {
  const diff=Date.now()-ts, m=Math.floor(diff/60000);
  if(m<1)  return '刚刚';
  if(m<60) return `${m} 分钟前`;
  const h=Math.floor(m/60);
  if(h<24) return `${h} 小时前`;
  const d=Math.floor(h/24);
  if(d<30) return `${d} 天前`;
  return new Date(ts).toLocaleDateString('zh-CN');
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

let toastT;
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),3000);
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
init();
</script>
