<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CSP AI Agent - 工作流拼装</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--surface3:#2a2f47;
  --border:#2e3354;--accent:#5b6ef5;--accent2:#7b8dff;--accent-bg:rgba(91,110,245,.14);
  --green:#2dd4bf;--green-bg:rgba(45,212,191,.13);
  --yellow:#f59e0b;--yellow-bg:rgba(245,158,11,.12);
  --red:#f87171;--red-bg:rgba(248,113,113,.12);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.14);
  --pink:#f472b6;
  --text:#e2e8f0;--muted:#64748b;--dim:#94a3b8;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

/* ── Header ── */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);height:52px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.logo{font-size:14px;font-weight:700;color:var(--accent);letter-spacing:-.3px;white-space:nowrap}
.hdr-sep{width:1px;height:22px;background:var(--border)}
.wf-name{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-weight:600;padding:5px 11px;width:200px;outline:none}
.wf-name:focus{border-color:var(--accent)}
.hdr-btns{display:flex;gap:6px}
.btn{padding:5px 13px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-ghost{background:transparent;color:var(--dim);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-success{background:var(--green);color:#0f1117;font-weight:600}
.btn-success:hover{opacity:.88}

/* ── Body ── */
.body{display:grid;grid-template-columns:252px 1fr 272px;flex:1;overflow:hidden}

/* ── Left Panel ── */
.lpanel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.lp-head{padding:12px 14px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.lp-head h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:8px}
.search-wrap{position:relative}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:6px 10px 6px 28px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.search-ico{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted)}
.ftabs{display:flex;gap:4px;padding:8px 14px 0;flex-shrink:0;flex-wrap:wrap}
.ftab{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .12s}
.ftab:hover{color:var(--text);border-color:var(--dim)}
.ftab.on{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}
.ftab.on.rule{background:var(--yellow-bg);color:var(--yellow);border-color:var(--yellow)}
.ftab.on.skill{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.ftab.on.mcp{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}
.ftab.on.command{background:var(--purple-bg);color:var(--purple);border-color:var(--purple)}

.rlist{flex:1;overflow-y:auto;padding:8px 10px}
.rlist::-webkit-scrollbar{width:3px}
.rlist::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.rgroup-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:7px 4px 3px}
.rcard{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 11px;margin-bottom:5px;cursor:grab;transition:all .13s}
.rcard:hover{border-color:var(--accent);background:rgba(91,110,245,.06);transform:translateX(2px)}
.rcard:active{cursor:grabbing;opacity:.8}
.rcard-top{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.rtag{font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0}
.rtag-rule{background:var(--yellow-bg);color:var(--yellow)}
.rtag-skill{background:var(--green-bg);color:var(--green)}
.rtag-mcp{background:var(--accent-bg);color:var(--accent)}
.rtag-command{background:var(--purple-bg);color:var(--purple)}
.rcard-name{font-size:12px;font-weight:600;color:var(--text)}
.rcard-desc{font-size:11px;color:var(--muted);line-height:1.4}
.drag-hint{font-size:10px;color:var(--muted);padding:12px 4px;text-align:center}

/* ── Canvas ── */
.canvas-area{position:relative;overflow:hidden;background:var(--bg);background-image:radial-gradient(circle,rgba(91,110,245,.07) 1px,transparent 1px);background-size:26px 26px}
.ctoolbar{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px 8px;z-index:20}
.ctool{font-size:12px;padding:4px 10px;border-radius:5px;cursor:pointer;color:var(--muted);background:transparent;border:none;transition:all .13s}
.ctool:hover{background:var(--surface2);color:var(--text)}
.ctool.on{background:var(--accent-bg);color:var(--accent)}
/* connecting state banner */
.connect-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--accent);border-radius:6px;padding:6px 16px;font-size:12px;color:var(--accent);z-index:20;display:none;pointer-events:none;white-space:nowrap}

#cvs{width:100%;height:100%;position:relative}
svg#svg-lines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
svg#svg-lines path.edge-hit{pointer-events:all}
svg#svg-lines path.edge-hit{pointer-events:stroke}

.empty-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;opacity:.5}
.empty-hint .ei{font-size:44px;margin-bottom:10px}
.empty-hint p{font-size:13px;color:var(--muted)}

/* ── Nodes ── */
.wnode{position:absolute;background:var(--surface);border:2px solid var(--border);border-radius:11px;min-width:155px;max-width:200px;padding:13px 14px 11px;z-index:2;cursor:move;transition:border-color .13s,box-shadow .13s}
.wnode:hover{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-bg)}
.wnode.sel{border-color:var(--accent);box-shadow:0 0 0 6px var(--accent-bg)}
.wnode.entry-node{border-color:var(--green)}
.wnode.entry-node:hover,.wnode.entry-node.sel{border-color:var(--green);box-shadow:0 0 0 5px var(--green-bg)}
.wnode.decision-node{border-color:var(--yellow)}
.wnode.decision-node:hover,.wnode.decision-node.sel{border-color:var(--yellow);box-shadow:0 0 0 5px var(--yellow-bg)}
.wnode.end-node{border-color:var(--purple)}
.wnode.end-node:hover,.wnode.end-node.sel{border-color:var(--purple);box-shadow:0 0 0 5px var(--purple-bg)}
.wnode.connect-target{border-color:var(--green)!important;box-shadow:0 0 0 6px var(--green-bg)!important;cursor:crosshair}

.ntypebadge{display:flex;align-items:center;gap:4px;margin-bottom:5px}
.ndot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ndot-entry{background:var(--green)}
.ndot-step{background:var(--accent)}
.ndot-decision{background:var(--yellow)}
.ndot-end{background:var(--purple)}
.ntype-text{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.ntitle{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;word-break:break-word}
.ndesc{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:8px}
.nchips{display:flex;flex-wrap:wrap;gap:3px}
.nchip{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500}
.chip-rule{background:var(--yellow-bg);color:var(--yellow)}
.chip-skill{background:var(--green-bg);color:var(--green)}
.chip-mcp{background:var(--accent-bg);color:var(--accent)}
.chip-command{background:var(--purple-bg);color:var(--purple)}

.nactions{position:absolute;top:6px;right:6px;display:none;gap:3px}
.wnode:hover .nactions{display:flex}
.nact{width:20px;height:20px;border-radius:4px;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;background:var(--surface2);color:var(--muted);transition:all .12s}
.nact:hover{background:var(--accent-bg);color:var(--accent)}
.nact.del:hover{background:var(--red-bg);color:var(--red)}

/* Connection ports — all uniform color (accent), direction-agnostic */
.port{position:absolute;width:13px;height:13px;border-radius:50%;border:2.5px solid var(--accent);background:var(--bg);cursor:crosshair;z-index:5;transition:transform .13s,background .13s,box-shadow .13s;opacity:0}
.wnode:hover .port{opacity:1}
.port:hover{background:var(--accent);transform:scale(1.5)!important;box-shadow:0 0 0 4px var(--accent-bg)}
.port-s{bottom:-7px;left:50%;transform:translateX(-50%)}
.port-s:hover{transform:translateX(-50%) scale(1.5)!important}
.port-n{top:-7px;left:50%;transform:translateX(-50%)}
.port-n:hover{transform:translateX(-50%) scale(1.5)!important}
.port-e{right:-7px;top:50%;transform:translateY(-50%)}
.port-e:hover{transform:translateY(-50%) scale(1.5)!important}
.port-w{left:-7px;top:50%;transform:translateY(-50%)}
.port-w:hover{transform:translateY(-50%) scale(1.5)!important}
/* when a connection is being drawn, show all ports and pulse targets */
body.connecting .port{opacity:1}
body.connecting .port.can-connect{animation:portPulse .65s ease-in-out infinite alternate}
@keyframes portPulse{from{box-shadow:0 0 0 2px var(--accent-bg)}to{box-shadow:0 0 0 7px var(--accent-bg);background:var(--accent)}}

/* drop highlight */
.wnode.drop-hi{border-color:var(--green)!important;background:rgba(45,212,191,.06);box-shadow:0 0 0 5px var(--green-bg)!important}

/* ── Right Panel ── */
.rpanel{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.rp-head{padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.rp-head h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
.rp-node-title{font-size:14px;font-weight:700;color:var(--text);margin-top:3px}
.rp-body{flex:1;overflow-y:auto;padding:12px 14px}
.rp-body::-webkit-scrollbar{width:3px}
.rp-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.cfg-sec{margin-bottom:16px}
.cfg-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.cfg-add{font-size:11px;color:var(--accent);cursor:pointer;background:none;border:none;padding:0;font-weight:500}
.cfg-add:hover{text-decoration:underline}
.cfg-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:7px 10px;outline:none;margin-bottom:5px}
.cfg-input:focus{border-color:var(--accent)}
select.cfg-input{cursor:pointer}
textarea.cfg-input{resize:vertical;min-height:60px;font-family:inherit;line-height:1.5}

/* Bound resource row */
.bres{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 9px;margin-bottom:4px}
.bres-l{display:flex;align-items:center;gap:6px}
.bres-name{font-size:12px;font-weight:500;color:var(--text)}
.bres-rm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:3px;line-height:1}
.bres-rm:hover{color:var(--red);background:var(--red-bg)}

/* Add resource slot */
.add-slot{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px dashed var(--border);border-radius:6px;padding:6px 10px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .13s;margin-bottom:4px}
.add-slot:hover{border-color:var(--accent);color:var(--accent)}

/* empty config */
.empty-cfg{padding:36px 14px;text-align:center}
.empty-cfg .ei{font-size:32px;margin-bottom:8px;opacity:.4}
.empty-cfg p{font-size:12px;color:var(--muted)}

/* prompt */
.prompt-item{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px}
.prompt-text{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 9px;font-size:12px;color:var(--dim);line-height:1.5;outline:none;font-family:inherit;resize:none;min-height:48px}
.prompt-text:focus{border-color:var(--accent);color:var(--text)}
.prompt-rm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:4px;border-radius:3px;flex-shrink:0;margin-top:2px}
.prompt-rm:hover{color:var(--red);background:var(--red-bg)}

/* ── Status bar ── */
.sbar{background:var(--surface);border-top:1px solid var(--border);height:26px;padding:0 14px;display:flex;align-items:center;gap:14px;flex-shrink:0;font-size:11px;color:var(--muted)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:480px;max-height:520px;display:flex;flex-direction:column;transform:translateY(12px);transition:transform .18s}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-head{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:700;color:var(--text)}
.modal-sub{font-size:12px;color:var(--muted);margin-top:2px}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px;line-height:1}
.modal-close:hover{color:var(--text);background:var(--surface2)}
.modal-search{padding:10px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-search input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;padding:8px 12px;outline:none}
.modal-search input:focus{border-color:var(--accent)}
.modal-ftabs{padding:8px 18px 0;display:flex;gap:5px;flex-shrink:0}
.modal-body{flex:1;overflow-y:auto;padding:8px 14px 14px}
.modal-body::-webkit-scrollbar{width:3px}
.modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.mres-card{display:flex;align-items:flex-start;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .13s}
.mres-card:hover{border-color:var(--accent);background:rgba(91,110,245,.06)}
.mres-card.added{border-color:var(--green);background:var(--green-bg);cursor:default}
.mres-info{display:flex;flex-direction:column;gap:3px}
.mres-top{display:flex;align-items:center;gap:7px}
.mres-name{font-size:13px;font-weight:600;color:var(--text)}
.mres-desc{font-size:11px;color:var(--muted);line-height:1.4}
.mres-action{flex-shrink:0;margin-left:10px}
.mres-add-btn{font-size:11px;padding:4px 10px;border-radius:5px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;transition:all .13s;white-space:nowrap}
.mres-add-btn:hover{background:var(--accent);color:#fff}
.mres-added-badge{font-size:11px;color:var(--green);font-weight:500}

/* ── Edge property popup ── */
.edge-popup{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;z-index:150;min-width:224px;box-shadow:0 8px 32px rgba(0,0,0,.45);display:none}
.edge-popup.show{display:block}
.edge-popup-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px}
.edge-type-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.etype-btn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--muted);transition:all .12s}
.etype-btn:hover{border-color:var(--dim);color:var(--text)}
.etype-btn.on-next{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}
.etype-btn.on-back{background:var(--yellow-bg);color:var(--yellow);border-color:var(--yellow)}
.etype-btn.on-condition{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.etype-btn.on-reject{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.edge-label-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;padding:5px 9px;outline:none;margin-bottom:10px}
.edge-label-input:focus{border-color:var(--accent)}
.edge-popup-actions{display:flex;justify-content:space-between;align-items:center}
.edge-del-btn{font-size:11px;color:var(--red);background:none;border:none;cursor:pointer;padding:3px 6px;border-radius:4px}
.edge-del-btn:hover{background:var(--red-bg)}
.edge-close-btn{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:3px 8px;border-radius:4px;border:1px solid var(--border)}
.edge-close-btn:hover{color:var(--text);background:var(--surface2)}

/* ── Toast ── */
.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 16px;font-size:13px;color:var(--text);opacity:0;transition:all .22s;z-index:200;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* temp line while drawing */
#tmp-line{pointer-events:none;stroke-dasharray:6,4}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div style="display:flex;align-items:center;gap:10px">
    <button class="btn btn-ghost" onclick="backToList()" style="padding:5px 10px;font-size:12px">← 工作流列表</button>
    <div class="hdr-sep"></div>
    <div class="logo">CSP Agent</div>
    <div class="hdr-sep"></div>
    <input class="wf-name" type="text" value="标准开发工作流" id="wfName" oninput="markDirty()"/>
  </div>
  <div class="hdr-btns">
    <span id="saveStatus" style="font-size:11px;color:var(--muted);align-self:center"></span>
    <button class="btn btn-ghost" onclick="clearAll()">清空</button>
    <button class="btn btn-ghost" onclick="loadTemplate()">📋 模板</button>
    <button class="btn btn-ghost" onclick="addNode('step')">＋ 节点</button>
    <button class="btn btn-ghost" onclick="saveWf()">💾 保存</button>
    <button class="btn btn-primary" onclick="exportWf()">导出 JSON</button>
    <button class="btn btn-success" onclick="publishWf()">🚀 发布</button>
  </div>
</div>

<!-- Body -->
<div class="body">

  <!-- Left -->
  <div class="lpanel">
    <div class="lp-head">
      <h3>资源库</h3>
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input type="text" id="lsearch" placeholder="搜索资源..." oninput="renderLeft()"/>
      </div>
    </div>
    <div class="ftabs">
      <button class="ftab on" data-f="all" onclick="setFilter('all',this)">全部</button>
      <button class="ftab rule" data-f="rule" onclick="setFilter('rule',this)">Rule</button>
      <button class="ftab skill" data-f="skill" onclick="setFilter('skill',this)">Skill</button>
      <button class="ftab mcp" data-f="mcp" onclick="setFilter('mcp',this)">MCP</button>
      <button class="ftab command" data-f="command" onclick="setFilter('command',this)">Command</button>
    </div>
    <div class="rlist" id="rlist"></div>
  </div>

  <!-- Canvas -->
  <div class="canvas-area" id="carea">
    <div class="ctoolbar">
      <button class="ctool on" id="tool-select">↖ 选择 / 连线</button>
    </div>
    <div class="connect-hint" id="connectHint">● 点击目标节点的任意端口完成连线 &nbsp;|&nbsp; Esc 取消</div>
    <div id="cvs">
      <svg id="svg-lines">
        <defs>
          <marker id="arrow-next" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="var(--accent)" fill-opacity=".85"/>
          </marker>
          <marker id="arrow-back" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="var(--yellow)" fill-opacity=".85"/>
          </marker>

<!-- Status bar -->
<div class="sbar">

    <div class="modal-head">

    <button class="edge-close-btn" onclick="closeEdgePopup()">完成</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════
// Data
// ════════════════════════════════════════
const RESOURCES = [
  {id:'security-rule',type:'rule',name:'Security Baseline',desc:'安全开发基线，覆盖输入验证、密钥管理、XSS/CSRF 防护'},
  {id:'code-style-rule',type:'rule',name:'Code Style Rule',desc:'代码风格约束，保证团队代码一致性'},
  {id:'openspec-rule',type:'rule',name:'OpenSpec Rule',desc:'OpenSpec 驱动开发流程规范，强制 propose→validate→archive'},
  {id:'agents-rule',type:'rule',name:'AGENTS Rule',desc:'AI Agent 工作规范约束'},
  {id:'cpp20-rule',type:'rule',name:'C++20 Rule',desc:'C++20 标准编码规范，优先使用现代语法'},
  {id:'code-review-skill',type:'skill',name:'Code Review Skill',desc:'多平台代码审查，覆盖内存安全、线程安全、SOLID 原则'},
  {id:'ut-review-skill',type:'skill',name:'UT Review Skill',desc:'单元测试质量评估，验证覆盖率与场景完整性'},
  {id:'design-skill',type:'skill',name:'Design Skill',desc:'辅助技术方案设计和架构决策'},
  {id:'log-skill',type:'skill',name:'Log Diagnosis Skill',desc:'结构化日志分析和故障定位'},
  {id:'find-skill',type:'skill',name:'Find Skills',desc:'帮助用户发现和安装新的 Agent Skill'},
  {id:'gitlab-mcp',type:'mcp',name:'GitLab MCP',desc:'支持 MR 创建、分支管理、CI 查询、代码审查'},
  {id:'openspec-mcp',type:'mcp',name:'OpenSpec MCP',desc:'管理 OpenSpec 变更提案：create / validate / archive'},
  {id:'jenkins-mcp',type:'mcp',name:'Jenkins MCP',desc:'触发和查询 Jenkins 构建任务'},
  {id:'devhelper-mcp',type:'mcp',name:'DevHelper MCP',desc:'集成 GitLab / Jira / Confluence / Zoom Doc'},
  {id:'acm-mcp',type:'mcp',name:'ACM MCP',desc:'ACM 命令上传与管理'},
  {id:'npm-pub',type:'command',name:'npm publish',desc:'发布 npm 包到 registry'},
  {id:'git-commit',type:'command',name:'git commit',desc:'安全提交代码到远端仓库'},
  {id:'openspec-cmd',type:'command',name:'openspec archive',desc:'归档完成的 OpenSpec 变更提案'},
];

let nodes=[], edges=[], selNode=null;
let dragging=null, dragOff={x:0,y:0};
let nodeIdx=1;
// connect state
let connectFrom=null; // {nodeId, port}
// selected edge key for popup
let selEdgeKey=null; // "fromId|fromPort|toId|toPort"
let leftFilter='all', modalFilter='all', modalTargetNode=null;

// Edge type config
const EDGE_TYPES={
  next:      {label:'正向', color:'var(--accent)', dash:'',    marker:'url(#arrow-next)'},
  back:      {label:'回退', color:'var(--yellow)', dash:'7,4', marker:'url(#arrow-back)'},
  condition: {label:'条件', color:'var(--green)',  dash:'',    marker:'url(#arrow-cond)'},
  reject:    {label:'拒绝', color:'var(--red)',    dash:'5,3', marker:'url(#arrow-rej)'},
};

// ════════════════════════════════════════
// Left panel
// ════════════════════════════════════════
function renderLeft(){
  const q=document.getElementById('lsearch').value.toLowerCase();
  const list=document.getElementById('rlist');
  const groups={rule:[],skill:[],mcp:[],command:[]};
  RESOURCES.forEach(r=>{
    if(leftFilter!=='all'&&r.type!==leftFilter)return;
    if(q&&!r.name.toLowerCase().includes(q)&&!r.desc.toLowerCase().includes(q))return;
    groups[r.type].push(r);
  });
  const labels={rule:'📋 Rules',skill:'⚡ Skills',mcp:'🔌 MCPs',command:'⌨️ Commands'};
  list.innerHTML='';
  let any=false;
  Object.entries(groups).forEach(([type,items])=>{
    if(!items.length)return;
    any=true;
    const gl=document.createElement('div');gl.className='rgroup-label';gl.textContent=labels[type];list.appendChild(gl);
    items.forEach(r=>{
      const c=document.createElement('div');
      c.className='rcard';c.draggable=true;c.dataset.rid=r.id;
      c.innerHTML=`<div class="rcard-top"><span class="rtag rtag-${r.type}">${r.type}</span><span class="rcard-name">${r.name}</span></div><div class="rcard-desc">${r.desc}</div>`;
      c.addEventListener('dragstart',e=>{e.dataTransfer.setData('rid',r.id);e.dataTransfer.effectAllowed='copy';});
      list.appendChild(c);
    });
  });
  if(!any)list.innerHTML='<div class="drag-hint">无匹配资源</div>';
  else list.appendChild(Object.assign(document.createElement('div'),{className:'drag-hint',textContent:'拖拽资源到画布节点'}));
}

function setFilter(f,btn){
  leftFilter=f;
  document.querySelectorAll('.lpanel .ftab').forEach(b=>{b.classList.remove('on');});
  btn.classList.add('on');
  renderLeft();
}

// ════════════════════════════════════════
// Canvas drag-and-drop to create node
// ════════════════════════════════════════
const carea=document.getElementById('carea');
const cvs=document.getElementById('cvs');

carea.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='copy';});
carea.addEventListener('drop',e=>{
  e.preventDefault();
  const rid=e.dataTransfer.getData('rid');
  if(!rid)return;
  const res=RESOURCES.find(r=>r.id===rid);
  if(!res)return;
  const rect=carea.getBoundingClientRect();
  const x=e.clientX-rect.left-85;
  const y=e.clientY-rect.top-45;
  const node=createNode('step',Math.max(10,x),Math.max(10,y));
  if(!node.resources.find(r=>r.id===res.id))node.resources.push(res);
  refreshNode(node.id);
  selectNode(node.id);
  hideEmptyHint();
  toast(`已创建节点并绑定「${res.name}」`);
});

// ════════════════════════════════════════
// Connect state helpers
// ════════════════════════════════════════
function enterConnecting(nodeId, port){
  connectFrom = {nodeId, port};
  closeEdgePopup();
  document.body.classList.add('connecting');
  document.getElementById('connectHint').style.display='block';
  document.querySelectorAll('.wnode').forEach(el=>{
    if(el.id===nodeId)return;
    el.querySelectorAll('.port').forEach(p=>p.classList.add('can-connect'));
  });
  const pos=getPortPos(nodeId,port);
  if(pos){
    const tl=document.getElementById('tmp-line');
    tl.setAttribute('x1',pos.x);tl.setAttribute('y1',pos.y);
    tl.setAttribute('x2',pos.x);tl.setAttribute('y2',pos.y);
    tl.setAttribute('stroke','var(--accent)');
    tl.style.display='';
  }
}

function cancelConnecting(){
  connectFrom=null;
  document.body.classList.remove('connecting');
  document.getElementById('connectHint').style.display='none';
  document.querySelectorAll('.port.can-connect').forEach(p=>p.classList.remove('can-connect'));
  hideTmpLine();
}

// ════════════════════════════════════════
// Nodes
// ════════════════════════════════════════
function createNode(type,x,y){
  const typeNames={entry:'入口',step:'步骤',decision:'决策',end:'结束'};
  const typeDescs={entry:'工作流起始点',step:'执行阶段',decision:'条件判断分支',end:'工作流终点'};
  const id='n'+(nodeIdx++);
  const node={id,type,title:typeNames[type],desc:typeDescs[type],x,y,resources:[],prompts:[]};
  nodes.push(node);
  renderNodeEl(node);
  updateSbar();
  return node;
}

function addNode(type='step'){
  const rect=carea.getBoundingClientRect();
  const node=createNode(type,Math.max(10,rect.width/2-85+Math.random()*40-20),Math.max(10,80+nodes.length*20));
  hideEmptyHint();
  selectNode(node.id);
}

function renderNodeEl(node){
  const el=document.createElement('div');
  el.id=node.id;
  el.className=`wnode ${node.type}-node`;
  el.style.left=node.x+'px';
  el.style.top=node.y+'px';
  rebuildNodeHtml(el,node);

  // mousedown: start drag-move (only if not clicking port/action btn)
  el.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('port')||e.target.classList.contains('nact'))return;
    if(connectFrom){return;} // don't start drag while connecting
    dragging=node.id;
    const r=el.getBoundingClientRect();
    dragOff.x=e.clientX-r.left;
    dragOff.y=e.clientY-r.top;
    e.preventDefault();
  });
  // Unified click via delegation -- survives innerHTML rebuilds on every refreshNode call.
  // Port elements are destroyed/recreated by rebuildNodeHtml, so we MUST handle
  // their clicks here on the stable container element.
  el.addEventListener('click',e=>{
    const portEl=e.target.closest('.port');
    if(portEl){
      e.stopPropagation();
      const port=portEl.dataset.port;
      if(!connectFrom){
        enterConnecting(node.id,port);
      } else if(connectFrom.nodeId===node.id){
        cancelConnecting();
      } else {
        finalizeEdge(node.id,port);
      }
      return;
    }
    if(e.target.classList.contains('nact'))return;
    if(connectFrom&&connectFrom.nodeId!==node.id){
      finalizeEdge(node.id,'auto');
      return;
    }
    selectNode(node.id);
  });

  // drop resource onto node
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drop-hi');});
  el.addEventListener('dragleave',()=>el.classList.remove('drop-hi'));
  el.addEventListener('drop',e=>{
    e.preventDefault();e.stopPropagation();
    el.classList.remove('drop-hi');
    const rid=e.dataTransfer.getData('rid');
    if(!rid)return;
    const res=RESOURCES.find(r=>r.id===rid);
    if(!res)return;
    const nd=nodes.find(n=>n.id===node.id);
    if(!nd)return;
    if(nd.resources.find(r=>r.id===rid)){toast('该资源已绑定');return;}
    nd.resources.push(res);
    refreshNode(node.id);
    if(selNode===node.id)renderRightPanel(node.id);
    updateSbar();
    toast(`已绑定「${res.name}」`);
  });

  cvs.appendChild(el);
}

function rebuildNodeHtml(el,node){
  const dotClass={entry:'ndot-entry',step:'ndot-step',decision:'ndot-decision',end:'ndot-end'}[node.type];
  const typeLabel={entry:'Entry',step:'Step',decision:'Decision',end:'End'}[node.type];
  const chips=node.resources.map(r=>`<span class="nchip chip-${r.type}">${r.name}</span>`).join('');
  el.innerHTML=`
    <div class="ntypebadge"><div class="ndot ${dotClass}"></div><span class="ntype-text">${typeLabel}</span></div>
    <div class="ntitle">${node.title}</div>
    <div class="ndesc">${node.desc}</div>
    ${chips?`<div class="nchips">${chips}</div>`:''}
    <div class="nactions">
      <button class="nact" onclick="event.stopPropagation();duplicateNode('${node.id}')" title="复制">⧉</button>
      <button class="nact del" onclick="event.stopPropagation();deleteNode('${node.id}')" title="删除">✕</button>
    </div>
    <div class="port port-n" data-port="n" title="上方端口：点击开始/完成连线"></div>
    <div class="port port-s" data-port="s" title="下方端口：点击开始/完成连线"></div>
    <div class="port port-e" data-port="e" title="右侧端口：点击开始/完成连线（回退路径）"></div>
    <div class="port port-w" data-port="w" title="左侧端口：点击开始/完成连线（回退路径）"></div>
  `;
  // Port clicks handled by delegation on container el (see renderNodeEl).
  // Do NOT add per-port listeners here -- they accumulate on every rebuild.
}

function bindPortEvents(){}

function refreshNode(nodeId){
  const node=nodes.find(n=>n.id===nodeId);
  if(!node)return;
  const el=document.getElementById(nodeId);
  if(!el)return;
  rebuildNodeHtml(el,node);
}

function selectNode(id){
  document.querySelectorAll('.wnode').forEach(el=>el.classList.remove('sel'));
  const el=document.getElementById(id);
  if(el)el.classList.add('sel');
  selNode=id;
  renderRightPanel(id);
}

function deleteNode(id){
  nodes=nodes.filter(n=>n.id!==id);
  edges=edges.filter(e=>e.from!==id&&e.to!==id);
  const el=document.getElementById(id);if(el)el.remove();
  if(selNode===id){selNode=null;clearRightPanel();}
  drawEdges();updateSbar();
  if(!nodes.length)showEmptyHint();
}

function duplicateNode(id){
  const n=nodes.find(x=>x.id===id);if(!n)return;
  const nn=createNode(n.type,n.x+20,n.y+20);
  nn.title=n.title+' 副本';nn.desc=n.desc;
  nn.resources=[...n.resources];nn.prompts=[...n.prompts];
  refreshNode(nn.id);selectNode(nn.id);toast('节点已复制');
}

// ════════════════════════════════════════
// Node drag-move
// ════════════════════════════════════════
document.addEventListener('mousemove',e=>{
  if(!dragging)return;
  const el=document.getElementById(dragging);if(!el)return;
  const rect=carea.getBoundingClientRect();
  const x=Math.max(0,e.clientX-rect.left-dragOff.x);
  const y=Math.max(0,e.clientY-rect.top-dragOff.y);
  el.style.left=x+'px';el.style.top=y+'px';
  const nd=nodes.find(n=>n.id===dragging);if(nd){nd.x=x;nd.y=y;}
  drawEdges();

  // also update tmp-line if in connect mode drawing
  if(connectFrom){
    const tl=document.getElementById('tmp-line');
    if(tl.getAttribute('x1')){
      const r=carea.getBoundingClientRect();
      tl.setAttribute('x2',e.clientX-r.left);
      tl.setAttribute('y2',e.clientY-r.top);
    }
  }
});
document.addEventListener('mouseup',()=>{dragging=null;});

// ════════════════════════════════════════
// Finalize edge
// ════════════════════════════════════════
function finalizeEdge(toNodeId, toPort){
  if(!connectFrom)return;
  const fromId=connectFrom.nodeId, fromPort=connectFrom.port;
  // resolve 'auto': pick nearest port of target node
  const resolvedToPort = (toPort==='auto') ? pickNearestPort(fromId, fromPort, toNodeId) : toPort;
  const key=`${fromId}|${fromPort}|${toNodeId}|${resolvedToPort}`;
  // allow one-to-many; only block exact duplicate
  if(edges.find(e=>`${e.from}|${e.fromPort}|${e.to}|${e.toPort}`===key)){
    toast('该连线已存在');cancelConnecting();return;
  }
  const edge={from:fromId, fromPort, to:toNodeId, toPort:resolvedToPort, type:'next', label:''};
  edges.push(edge);
  cancelConnecting();
  drawEdges();updateSbar();
  // open popup so user can adjust type/label
  const toEl=document.getElementById(toNodeId);
  if(toEl){
    const r=toEl.getBoundingClientRect();
    openEdgePopup(key, r.left+r.width/2, r.top-10);
  }
  toast(`已连线 → ${nodes.find(n=>n.id===toNodeId)?.title||toNodeId}`);
}

// pick the port of targetNode that is geometrically closest to sourceNode's active port
function pickNearestPort(fromId, fromPort, toId){
  const p0=getPortPos(fromId, fromPort);
  if(!p0)return 'n';
  const ports=['n','s','e','w'];
  let best='n', bestD=Infinity;
  ports.forEach(pt=>{
    const p=getPortPos(toId, pt);
    if(!p)return;
    const d=(p.x-p0.x)**2+(p.y-p0.y)**2;
    if(d<bestD){bestD=d;best=pt;}
  });
  return best;
}

// live tmp-line follows mouse
carea.addEventListener('mousemove',e=>{
  if(!connectFrom)return;
  const tl=document.getElementById('tmp-line');
  if(!tl.getAttribute('x1'))return;
  const rect=carea.getBoundingClientRect();
  tl.setAttribute('x2',e.clientX-rect.left);
  tl.setAttribute('y2',e.clientY-rect.top);
});

// click canvas background to cancel connect / close popup / deselect
cvs.addEventListener('click',e=>{
  if(e.target===cvs||e.target.id==='svg-lines'){
    if(connectFrom){cancelConnecting();return;}
    if(selEdgeKey){closeEdgePopup();return;}
    selNode=null;
    document.querySelectorAll('.wnode').forEach(el=>el.classList.remove('sel'));
    clearRightPanel();
  }
});

function hideTmpLine(){
  const tl=document.getElementById('tmp-line');
  tl.style.display='none';
  tl.removeAttribute('x1');tl.removeAttribute('y1');tl.removeAttribute('x2');tl.removeAttribute('y2');
}

// ════════════════════════════════════════
// Draw edges
// ════════════════════════════════════════
function getPortPos(nodeId, port){
  const el=document.getElementById(nodeId);if(!el)return null;
  const elR=el.getBoundingClientRect();
  const aR=carea.getBoundingClientRect();
  const cx=elR.left-aR.left+elR.width/2;
  const cy=elR.top-aR.top+elR.height/2;
  const hw=elR.width/2, hh=elR.height/2;
  const map={n:{x:cx,y:cy-hh},s:{x:cx,y:cy+hh},e:{x:cx+hw,y:cy},w:{x:cx-hw,y:cy}};
  return map[port]||map['s'];
}

function edgeKey(e){return `${e.from}|${e.fromPort}|${e.to}|${e.toPort}`;}

function drawEdges(){
  const svg=document.getElementById('svg-lines');
  [...svg.children].forEach(c=>{if(c.tagName==='defs'||c.id==='tmp-line')return;c.remove();});

  edges.forEach(edge=>{
    const fromEl=document.getElementById(edge.from);
    const toEl=document.getElementById(edge.to);
    if(!fromEl||!toEl)return;

    const fp=edge.fromPort||'s';
    const tp=edge.toPort||'n';
    const p1=getPortPos(edge.from,fp);
    const p2=getPortPos(edge.to,tp);
    if(!p1||!p2)return;

    const cfg=EDGE_TYPES[edge.type]||EDGE_TYPES.next;

    // cubic bezier control points based on port direction
    const portDelta={n:{dx:0,dy:-70},s:{dx:0,dy:70},e:{dx:70,dy:0},w:{dx:-70,dy:0}};
    const d1=portDelta[fp]||{dx:0,dy:70};
    const d2=portDelta[tp]||{dx:0,dy:-70};
    const cx1=p1.x+d1.dx, cy1=p1.y+d1.dy;
    const cx2=p2.x+d2.dx, cy2=p2.y+d2.dy;
    const pathD=`M${p1.x},${p1.y} C${cx1},${cy1} ${cx2},${cy2} ${p2.x},${p2.y}`;

    const key=edgeKey(edge);
    const isSelected=selEdgeKey===key;

    // wide hit area — stroke must be non-transparent for SVG pointer-events:stroke to fire
    const hitPath=document.createElementNS('http://www.w3.org/2000/svg','path');
    hitPath.setAttribute('d',pathD);
    hitPath.setAttribute('stroke','rgba(255,255,255,0.01)'); // near-invisible but hittable
    hitPath.setAttribute('stroke-width','16');
    hitPath.setAttribute('fill','none');
    hitPath.setAttribute('class','edge-hit');
    hitPath.style.cursor='pointer';
    hitPath.style.pointerEvents='all';
    hitPath.addEventListener('click',ev=>{
      ev.stopPropagation();
      if(connectFrom){cancelConnecting();return;}
      openEdgePopup(key, ev.clientX, ev.clientY);
    });

    // visible path
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',pathD);
    path.setAttribute('stroke',cfg.color);
    path.setAttribute('stroke-width', isSelected?'3':'2');
    path.setAttribute('fill','none');
    path.setAttribute('stroke-opacity', isSelected?'1':'.75');
    if(cfg.dash)path.setAttribute('stroke-dasharray',cfg.dash);
    path.setAttribute('marker-end',cfg.marker);
    path.style.pointerEvents='none';
    if(isSelected)path.setAttribute('filter','drop-shadow(0 0 5px '+cfg.color+')');

    // label text if any
    if(edge.label){
      const mid=getCubicMidPoint(p1,{x:cx1,y:cy1},{x:cx2,y:cy2},p2);
      const lbg=document.createElementNS('http://www.w3.org/2000/svg','rect');
      lbg.setAttribute('x',mid.x-20);lbg.setAttribute('y',mid.y-9);
      lbg.setAttribute('width','40');lbg.setAttribute('height','16');
      lbg.setAttribute('rx','4');lbg.setAttribute('fill','var(--surface)');
      lbg.setAttribute('stroke',cfg.color);lbg.setAttribute('stroke-width','1');
      lbg.style.pointerEvents='none';
      const lt=document.createElementNS('http://www.w3.org/2000/svg','text');
      lt.setAttribute('x',mid.x);lt.setAttribute('y',mid.y+4);
      lt.setAttribute('text-anchor','middle');lt.setAttribute('fill',cfg.color);
      lt.setAttribute('font-size','10');lt.style.pointerEvents='none';
      lt.textContent=edge.label.slice(0,8)+(edge.label.length>8?'…':'');
      svg.appendChild(lbg);svg.appendChild(lt);
    }

    svg.appendChild(hitPath);
    svg.appendChild(path);
  });
}

function getCubicMidPoint(p1,c1,c2,p2,t=0.5){
  // De Casteljau at t
  const mt=1-t;
  return {
    x: mt*mt*mt*p1.x+3*mt*mt*t*c1.x+3*mt*t*t*c2.x+t*t*t*p2.x,
    y: mt*mt*mt*p1.y+3*mt*mt*t*c1.y+3*mt*t*t*c2.y+t*t*t*p2.y
  };
}

function dropOnSlot(e,nodeId){
  e.preventDefault();e.stopPropagation();
  const rid=e.dataTransfer.getData('rid');if(!rid)return;
  const res=RESOURCES.find(r=>r.id===rid);if(!res)return;
  const node=nodes.find(n=>n.id===nodeId);if(!node)return;
  if(node.resources.find(r=>r.id===rid)){toast('已绑定');return;}
  node.resources.push(res);refreshNode(nodeId);renderRightPanel(nodeId);updateSbar();toast(`已绑定「${res.name}」`);
}

function removeRes(nodeId,rid){
  const node=nodes.find(n=>n.id===nodeId);if(!node)return;
  node.resources=node.resources.filter(r=>r.id!==rid);
  refreshNode(nodeId);renderRightPanel(nodeId);updateSbar();
}

function updField(nodeId,field,val){
  const node=nodes.find(n=>n.id===nodeId);if(!node)return;
  node[field]=val;
  refreshNode(nodeId);
  if(field==='title')document.getElementById('rpTitle').textContent=val;
}

function changeType(nodeId,type){
  const node=nodes.find(n=>n.id===nodeId);if(!node)return;
  node.type=type;
  const el=document.getElementById(nodeId);
  if(el){el.className=`wnode ${type}-node sel`;}
  refreshNode(nodeId);
}

function addPrompt(nodeId){
  const node=nodes.find(n=>n.id===nodeId);if(!node)return;
  node.prompts.push('在此输入引导 Prompt...');renderRightPanel(nodeId);
}
function rmPrompt(nodeId,i){
  const node=nodes.find(n=>n.id===nodeId);if(!node)return;
  node.prompts.splice(i,1);renderRightPanel(nodeId);
}
function updPrompt(nodeId,i,val){
  const node=nodes.find(n=>n.id===nodeId);if(!node)return;
  node.prompts[i]=val;
}

function openModal(nodeId,typeFilter='all'){
  modalTargetNode=nodeId;modalFilter=typeFilter;
  const node=nodes.find(n=>n.id===nodeId);
  document.getElementById('modalTitle').textContent='选择资源';
  document.getElementById('modalSub').textContent=`绑定到节点「${node?node.title:''}」`;
  document.getElementById('msearch').value='';
  // set modal filter tabs
  document.querySelectorAll('#modalFtabs .ftab').forEach(b=>{
    b.classList.toggle('on',b.dataset.f===typeFilter);
  });
  renderModal();
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('msearch').focus(),80);
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('modalOverlay'))return;
  document.getElementById('modalOverlay').classList.remove('show');
}

function setModalFilter(f,btn){
  modalFilter=f;
  document.querySelectorAll('#modalFtabs .ftab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderModal();
}

function renderModal(){
  const q=document.getElementById('msearch').value.toLowerCase();
  const node=nodes.find(n=>n.id===modalTargetNode);
  const bound=new Set(node?node.resources.map(r=>r.id):[]);
  const body=document.getElementById('modalBody');
  const items=RESOURCES.filter(r=>{
    if(modalFilter!=='all'&&r.type!==modalFilter)return false;
    if(q&&!r.name.toLowerCase().includes(q)&&!r.desc.toLowerCase().includes(q))return false;
    return true;
  });
  if(!items.length){body.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">无匹配资源</div>';return;}
  body.innerHTML=items.map(r=>{
    const isAdded=bound.has(r.id);
    return `
    <div class="mres-card ${isAdded?'added':''}" onclick="${isAdded?'':'addResFromModal(\''+r.id+'\')'}">
      <div class="mres-info">
        <div class="mres-top"><span class="rtag rtag-${r.type}">${r.type}</span><span class="mres-name">${r.name}</span></div>
        <div class="mres-desc">${r.desc}</div>
      </div>
      <div class="mres-action">
        ${isAdded
          ? '<span class="mres-added-badge">✓ 已绑定</span>'
          : `<button class="mres-add-btn" onclick="event.stopPropagation();addResFromModal('${r.id}')">绑定</button>`
        }
      </div>
    </div>`;
  }).join('');
}

function addResFromModal(rid){
  if(!modalTargetNode)return;
  const node=nodes.find(n=>n.id===modalTargetNode);if(!node)return;
  const res=RESOURCES.find(r=>r.id===rid);if(!res)return;
  if(node.resources.find(r=>r.id===rid)){toast('已绑定');return;}
  node.resources.push(res);
  refreshNode(node.id);
  renderRightPanel(node.id);
  renderModal(); // refresh added state
  updateSbar();
  toast(`已绑定「${res.name}」`);
}

  if(!nodes.length){toast('工作流为空，请先添加节点');return;}
  const STORAGE_KEY='csp_workflows';
  const name=document.getElementById('wfName').value.trim()||'未命名工作流';
  const wfId=sessionStorage.getItem('csp_edit_wf_id')||('wf-'+Date.now());
  sessionStorage.setItem('csp_edit_wf_id',wfId);
  const wfData={
    id:wfId,
    name,
    desc:'',
    status:publish?'active':'draft',
    version:'1.0',
    updatedAt:Date.now(),
    nodes:nodes.map(n=>({id:n.id,type:n.type,title:n.title,desc:n.desc,
      resources:n.resources.map(r=>({id:r.id,type:r.type,name:r.name})),
      prompts:n.prompts})),
    edges,
  };
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    let list=raw?JSON.parse(raw):[];
    const idx=list.findIndex(w=>w.id===wfId);
    if(idx>=0)list[idx]=wfData;
    else list.unshift(wfData);
    localStorage.setItem(STORAGE_KEY,JSON.stringify(list));
    isDirty=false;
    document.getElementById('saveStatus').textContent='已保存 '+new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    toast(publish?`🚀 已发布「${name}」`:`✅ 已保存「${name}」`);
  }catch(e){
    toast('保存失败：'+e.message);
  }

function autoLayout(nodeList, edgeList){
  if(!nodeList.length) return;
  // If all nodes already have valid x/y, skip
  const allHavePos = nodeList.every(n => typeof n.x === 'number' && typeof n.y === 'number' && (n.x !== 0 || n.y !== 0));
  if(allHavePos) return;

  // Build adjacency for topological sort (layered layout)
  const ids = nodeList.map(n => n.id);
  const inDeg = {};
  const outEdges = {};
  ids.forEach(id => { inDeg[id]=0; outEdges[id]=[]; });
  (edgeList||[]).forEach(e => {
    if(inDeg[e.to]!==undefined) inDeg[e.to]++;
    if(outEdges[e.from]!==undefined) outEdges[e.from].push(e.to);
  });

  // Kahn's topological sort → assign layers
  const layer = {};
  const queue = ids.filter(id => inDeg[id]===0);
  queue.forEach(id => layer[id]=0);
  let head=0;
  while(head<queue.length){
    const cur=queue[head++];
    (outEdges[cur]||[]).forEach(nxt=>{
      const newLayer=(layer[cur]||0)+1;
      if(layer[nxt]===undefined || layer[nxt]<newLayer) layer[nxt]=newLayer;
      inDeg[nxt]--;
      if(inDeg[nxt]<=0) queue.push(nxt);
    });
  }
  // Nodes not reached (cycles / disconnected) get their own layer at end
  ids.forEach(id => { if(layer[id]===undefined) layer[id]=Object.keys(layer).length; });

  // Group by layer, then position
  const layerGroups = {};
  ids.forEach(id => {
    const l=layer[id]||0;
    if(!layerGroups[l]) layerGroups[l]=[];
    layerGroups[l].push(id);
  });

  const NODE_W=180, NODE_H=120, GAP_X=60, GAP_Y=50;
  const CANVAS_PAD_X=60, CANVAS_PAD_Y=40;
  // Detect if layout should be vertical (more layers) or horizontal
  const numLayers=Object.keys(layerGroups).length;
  const maxPerLayer=Math.max(...Object.values(layerGroups).map(g=>g.length));

  Object.entries(layerGroups).forEach(([lStr, group])=>{
    const l=parseInt(lStr);
    const colW=group.length;
    group.forEach((id, i)=>{
      const node=nodeList.find(n=>n.id===id);
      if(!node) return;
      // Vertical layout: layers go top-to-bottom, nodes in same layer go left-to-right
      const totalW=colW*(NODE_W+GAP_X)-GAP_X;
      const startX=CANVAS_PAD_X + i*(NODE_W+GAP_X);
      const startY=CANVAS_PAD_Y + l*(NODE_H+GAP_Y);
      node.x=startX;
      node.y=startY;
    });
  });
}

function initFromStorage(){
  const STORAGE_KEY='csp_workflows';
  const wfId=sessionStorage.getItem('csp_edit_wf_id');
  if(!wfId){loadTemplate();return;}
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    const list=raw?JSON.parse(raw):[];
    const wf=list.find(w=>w.id===wfId);
    if(!wf){loadTemplate();return;}
    clearAll();
    document.getElementById('wfName').value=wf.name||'未命名工作流';
    nodeIdx=1000;
    const rawNodes=wf.nodes||[];
    // Auto-layout: assign x/y if missing, using topological sort + layered layout
    autoLayout(rawNodes, wf.edges||[]);
    rawNodes.forEach(n=>{
      n.resources=n.resources||[];n.prompts=n.prompts||[];
      nodes.push(n);renderNodeEl(n);
    });
    edges=wf.edges||[];
    setTimeout(()=>{drawEdges();},60);
    hideEmptyHint();updateSbar();
    isDirty=false;
    document.getElementById('saveStatus').textContent='';
    toast(`已加载「${wf.name}」`);
  }catch(e){
    loadTemplate();
  }
}
